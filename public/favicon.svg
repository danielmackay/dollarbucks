<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Navy rounded-rectangle background -->
  <rect width="512" height="512" rx="108" ry="108" fill="#0D2F55"/>

  <!-- Back coin (upper-left) -->
  <g transform="translate(206, 222)">
    <!-- Coin edge/rim -->
    <path d="M-95,0 L-95,32 A95,42 0 0,0 95,32 L95,0 A95,42 0 0,1 -95,0 Z" fill="#D4A017"/>
    <!-- Coin bottom edge -->
    <ellipse cx="0" cy="32" rx="95" ry="42" fill="#C89515"/>
    <!-- Coin top face -->
    <ellipse cx="0" cy="0" rx="95" ry="42" fill="#F5C842"/>
    <!-- Vertical segment lines on top face -->
    <line x1="-70" y1="-28" x2="-70" y2="28" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="-23" y1="-40" x2="-23" y2="40" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="23" y1="-40" x2="23" y2="40" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="70" y1="-28" x2="70" y2="28" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <!-- Horizontal line -->
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- Rim segment lines -->
    <line x1="-70" y1="28" x2="-70" y2="44" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-23" y1="40" x2="-23" y2="56" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="23" y1="40" x2="23" y2="56" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="70" y1="28" x2="70" y2="44" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Front coin (lower-right, overlapping) -->
  <g transform="translate(306, 274)">
    <!-- Coin edge/rim -->
    <path d="M-95,0 L-95,32 A95,42 0 0,0 95,32 L95,0 A95,42 0 0,1 -95,0 Z" fill="#D4A017"/>
    <!-- Coin bottom edge -->
    <ellipse cx="0" cy="32" rx="95" ry="42" fill="#C89515"/>
    <!-- Coin top face -->
    <ellipse cx="0" cy="0" rx="95" ry="42" fill="#F5C842"/>
    <!-- Vertical segment lines on top face -->
    <line x1="-70" y1="-28" x2="-70" y2="28" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="-23" y1="-40" x2="-23" y2="40" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="23" y1="-40" x2="23" y2="40" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="70" y1="-28" x2="70" y2="28" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <!-- Horizontal line -->
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#D4A017" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <!-- Rim segment lines -->
    <line x1="-70" y1="28" x2="-70" y2="44" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-23" y1="40" x2="-23" y2="56" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="23" y1="40" x2="23" y2="56" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="70" y1="28" x2="70" y2="44" stroke="#B8860B" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
