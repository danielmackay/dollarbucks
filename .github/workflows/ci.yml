name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun test:unit -- --reporter=verbose --reporter=junit --outputFile.junit=test-results/unit-junit.xml

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: E2E tests
        run: bun test:e2e

      - name: Report unit test results
        uses: dorny/test-reporter@v1.5.1
        if: always()
        with:
          name: Unit Tests
          path: test-results/unit-junit.xml
          reporter: jest-junit

      - name: Report E2E test results
        uses: dorny/test-reporter@v1.5.1
        if: always()
        with:
          name: E2E Tests
          path: test-results/e2e-junit.xml
          reporter: jest-junit

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
